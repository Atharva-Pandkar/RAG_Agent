# Run 26: FAISS-hybrid retrieval (BM25 + FAISS dense via RRF) over LangChain
# RecursiveCharacterTextSplitter chunks (1024/100), k=5.
# Variation vs run12: dense retriever backend (numpy -> FAISS) + chunking
# (custom fixed_size -> LangChain splitter).
run_name: run26_faisshybrid_lcrecursive1024

top_k: 5

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
  corpus_path: Experiments/corpora/langchain_recursive_1024_100.json
  retrieval_strategy: faiss_hybrid
  embedding_model: BAAI/bge-small-en-v1.5

golden_set_override: Experiments/corpora/golden_set_with_chunks_langchain_recursive_1024_100.json
