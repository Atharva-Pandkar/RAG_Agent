# Run 41: Hybrid retrieval (BM25 + dense RRF) on merged corpus, k=5.
# Mirrors run33 (hybrid k=5 on unstructured) on the full-coverage merged corpus.
run_name: run41_hybrid_merged_k5

top_k: 5

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
  corpus_path: Experiments/corpora/merged_unstr_xbrl.json
  retrieval_strategy: hybrid
  embedding_model: BAAI/bge-small-en-v1.5

golden_set_override: Experiments/corpora/golden_set_with_chunks_merged_unstr_xbrl.json
