# Run 08: Hybrid retrieval (BM25 + dense via RRF) over fixed-size (512/50) chunks.
# Variation vs run01/run07: retrieval strategy (BM25, dense -> hybrid).
run_name: run08_hybrid_fixed512

top_k: 5

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
