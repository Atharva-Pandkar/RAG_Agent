# Run 21: BM25 retrieval over LangChain RecursiveCharacterTextSplitter chunks
# (512/50, token-length function). Variation vs run01/run02: chunking via
# LangChain's built-in splitter instead of custom chunkers.
run_name: run21_bm25_lcrecursive512

top_k: 5

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
  corpus_path: Experiments/corpora/langchain_recursive_512_50.json
  retrieval_strategy: bm25

golden_set_override: Experiments/corpora/golden_set_with_chunks_langchain_recursive_512_50.json
