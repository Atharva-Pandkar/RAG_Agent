# Run 28: BM25 retrieval over LangChain-segmented section chunks (512/50):
# MarkdownHeaderTextSplitter splits the structured doc into sections, then
# our fixed_size_chunks token-window applies within each section.
# Variation vs run09 (section_based_512): segmentation via LangChain
# MarkdownHeaderTextSplitter instead of manual block-walking; tables not
# kept as standalone chunks.
run_name: run28_bm25_lcsection512

top_k: 5

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
  corpus_path: Experiments/corpora/langchain_section_512_50.json
  retrieval_strategy: bm25

golden_set_override: Experiments/corpora/golden_set_with_chunks_langchain_section_512_50.json
