# Run 27: FAISS-hybrid retrieval over LangChain RecursiveCharacterTextSplitter
# chunks (1024/100), k=10. Variation vs run16 (current best, recall@10=0.598):
# dense retriever backend (numpy -> FAISS) + chunking (custom fixed_size ->
# LangChain splitter).
run_name: run27_faisshybrid_lcrecursive1024_k10

top_k: 10

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
  corpus_path: Experiments/corpora/langchain_recursive_1024_100.json
  retrieval_strategy: faiss_hybrid
  embedding_model: BAAI/bge-small-en-v1.5

golden_set_override: Experiments/corpora/golden_set_with_chunks_langchain_recursive_1024_100.json
