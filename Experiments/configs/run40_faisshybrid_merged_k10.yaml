# Run 40: FAISS-hybrid (BM25 + FAISS dense via RRF) on merged corpus, k=10.
# Mirrors run36 (previous best) but on the full-coverage merged corpus.
# All 26 golden questions now have a gold chunk — measures true recall ceiling.
run_name: run40_faisshybrid_merged_k10

top_k: 10

pipeline_class: src.pipeline.RagPipeline
pipeline_kwargs:
  corpus_path: Experiments/corpora/merged_unstr_xbrl.json
  retrieval_strategy: faiss_hybrid
  embedding_model: BAAI/bge-small-en-v1.5

golden_set_override: Experiments/corpora/golden_set_with_chunks_merged_unstr_xbrl.json
